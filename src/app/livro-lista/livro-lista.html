<main class="container">
    <h1>Catálogo de Livros</h1>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Título</th>
                <th>Resumo</th>
                <th>Editora</th>
                <th>Autores</th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let livro of livros">
                <td>
                    <div class="titulo-livro">
                        {{ livro.titulo }}
                        <button class="btn btn-danger btn-sm" (click)="excluir(livro.codigo)">Excluir</button>
                    </div>
                </td>
                <td>{{ livro.resumo }}</td>
                <td>{{ obterNome(livro.codEditora) }}</td>
                <td>
                    <ul *ngFor="let autor of livro.autores">
                        <li> {{ autor }} </li>
                    </ul>
                </td>
            </tr>
        </tbody>
    </table>
</main>
